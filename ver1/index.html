<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artist Gallery</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="lang-switch">
      <span onclick="setLang('zh')">中文</span
      ><span onclick="setLang('jp')">日本語</span>
    </div>
    <header>
      <div class="artist-avatar"><img src="./img/photo/avatar.jpg" /></div>
      <h1 id="artist-name">加载中...</h1>
      <div class="artist-titles" id="artist-titles"></div>
      <p id="artist-desc"></p>
    </header>

    <div class="gallery" id="gallery-container">
      <div class="gallery-item"><img src="./img/art1.jpg" /></div>
      <div class="gallery-item"><img src="./img/art2.jpg" /></div>
      <div class="gallery-item"><img src="./img/art3.jpg" /></div>
      <div class="gallery-item"><img src="./img/art4.jpg" /></div>
      <div class="gallery-item"><img src="./img/art5.jpg" /></div>
      <div class="gallery-item"><img src="./img/art6.jpg" /></div>
    </div>

    <footer>
      <div class="footer-content">
        <div class="contact-label" id="contact-label">联系方式 / CONTACT</div>
        <div class="contact-info">
          <div class="contact-label" id="contact-label"></div>

          <div class="social-links-container">
            <a href="mailto:teacher@example.com" class="social-item mail-link">
              <span class="contact-icon">✉</span>
              <span class="email-text">teacher@example.com</span>
            </a>

            <div class="social-links-row">
              <span class="social-item" onclick="copyWeChat('WeChatID')">
                <span class="contact-icon">微信</span> WeChatID
              </span>

              <a
                href="https://xhslink.com/m/7lmFM6QzHbI"
                target="_blank"
                class="social-item xhs-link"
              >
                <span class="contact-icon">📕</span> 小红书 · RED
              </a>
            </div>
          </div>
        </div>
        <div class="divider"></div>
        <p>&copy; <span id="year"></span> <span id="footer-name"></span></p>
      </div>
    </footer>

    <div class="lightbox" id="lightbox">
      <span class="lightbox-close" id="lightbox-close">&times;</span>
      <div class="lightbox-nav lightbox-prev" id="lightbox-prev">&#10094;</div>
      <div class="lightbox-nav lightbox-next" id="lightbox-next">&#10095;</div>
      <div class="lightbox-content" id="lightbox-content">
        <img src="" id="lightbox-img" class="lightbox-img" />
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
